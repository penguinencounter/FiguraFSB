#org.gradle.configuration-cache=true
# prepareArchitecturyTransformer fails
org.gradle.configuration-cache=false
org.gradle.parallel=true
org.gradle.caching=true

org.gradle.jvmargs=-Xmx4096m

artifactRoot=fsb

# Versioning for 0.1.x-compatible builds (FiguraMC/Figura):
# [0].[figura "patch" version].[fsb minor version]+[minecraft]-[modloader or variant]
# ex. 0.6.1+1.21.4-neoforge = Figura 0.1.6 + FSB version 1 + Minecraft 1.21.4 + NeoForge loader

# include only the primary version digits here (x.y.z)
modVersion=0.6.1

group=org.figuramc.fsb
